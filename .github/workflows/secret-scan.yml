name: Secret Scan

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  gitleaks:
    name: Detect secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history — catches secrets in past commits of the push

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is only needed for private repos on the paid plan.
          # Public repos and the free tier of gitleaks-action work without it.
